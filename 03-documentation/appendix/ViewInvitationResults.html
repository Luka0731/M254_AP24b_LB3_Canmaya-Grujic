<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, form { font-family: Arial, sans-serif; font-size: 14px; color: #414141; background: #fff; }
  .tm-form { max-width: 680px; padding: 32px; background: #fff; }
  .tm-header { border-left: 4px solid #009cde; padding-left: 14px; margin-bottom: 28px; }
  .tm-header h1 { font-size: 1.3em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; color: #414141; }
  .tm-section { margin-bottom: 24px; }
  .tm-section-title { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.1em; color: #009cde; font-weight: bold; margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid #e5e5e5; }
  .tm-two-col { display: flex; gap: 24px; }
  .tm-col { flex: 1; }
  .tm-col-title { font-size: 0.8em; font-weight: bold; color: #414141; margin-bottom: 8px; }
  .tm-value-box { background: #f4f9fd; border: 1px solid #cce5f5; border-radius: 3px; padding: 12px 14px; font-size: 0.9em; color: #414141; min-height: 48px; }
  .tm-value-box.declined { background: #fff4f4; border-color: #f5cccc; }
</style>

<form role="form">
  <div class="tm-form">

    <div class="tm-header">
      <h1>Overview — Who Accepted the Invitation</h1>
    </div>

    <div class="tm-section">
      <div class="tm-two-col">

        <div class="tm-col">
          <div class="tm-col-title">People who accepted:</div>
          <div class="tm-value-box">{{ inviteesAccepted }}</div>
        </div>

        <div class="tm-col">
          <div class="tm-col-title">People who declined:</div>
          <div class="tm-value-box declined">{{ inviteesDeclined }}</div>
        </div>

      </div>
    </div>

  </div>
</form>
